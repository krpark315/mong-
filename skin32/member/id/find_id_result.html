<!--@layout(/layout/basic/layout.html)-->
<style>
    #contents { min-height: 80vh; }
    .titleArea{margin-bottom:0 !important;}
    .xans-member-findidresult .ec-base-box .complete .headDesc, .xans-member-findidresult .ec-base-box .complete .infoDesc { font-size: 16px; font-weight: 400; line-height: 1.5; }
    .xans-member-findidresult .ec-base-box .complete .term, .xans-member-findidresult .ec-base-box .complete .desc, .xans-member-findidresult .ec-base-box .complete .desc * { font-size: var(--font-size-xs); font-weight: var(--font-weight-regular); line-height: var(--line-height-lg); }
    .xans-member-findidresult .ec-base-box .complete .desc { margin:0;}
    .xans-member-findidresult .ec-base-box .complete label span { font-size: 16px; font-weight: 400; line-height: 1.5; }
    .xans-member-findidresult .ec-base-button.gBottom { gap: 8px; }
    @media(max-width: 1024px) {
        .xans-member-findidresult .ec-base-box .complete .headDesc, .xans-member-findidresult .ec-base-box .complete .infoDesc { font-size: 13px; }
        .xans-member-findidresult .ec-base-box .complete .term, .xans-member-findidresult .ec-base-box .complete .desc, .xans-member-findidresult .ec-base-box .complete .desc * { font-size: 13px; }
        .xans-member-findidresult .ec-base-box .complete label span { font-size: 13px; }
    }
</style>
<div class="section titleArea">
    <h2>아이디 찾기</h2>
</div>

<div module="member_findidresult" class="memberArea">
    <!--@css(/css/module/member/find_id_result.css)-->
    <div class="ec-base-box typeMember">
        <div class="complete">
            <p class="headDesc">고객님 아이디 찾기가 완료 되었습니다.</p>
            <p class="infoDesc">가입된 아이디가 총 <span class="txtEm">{$idCnt}</span>개 있습니다.</p>
            <div class="description">
                <ul class="ec-base-desc gSmall">
                    <li><strong class="term">이름</strong><div class="desc">{$name}</div></li>
                    <li><strong class="term">{$searchType}</strong><div class="desc">{$searchInfo}</div></li>
                </ul>
                {$searchIds}
            </div>
        </div>
    </div>
    <div class="ec-base-button gBottom">
        <a href="javascript:go_findlogin('{$id}');" class="btnNormalFix sizeM" role="button">로그인</a>
        <a href="javascript:go_findpwd('{$id}','{$mtype}');" class="btnSubmitFix sizeM" role="button">비밀번호 찾기</a>
    </div>
</div>
