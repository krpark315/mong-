<!--@layout(/layout/basic/layout.html)-->
<style>
    .titleArea{margin-bottom:0 !important;}
    .xans-member-findpasswdquestion .ec-base-box.typeMember { margin-top:50px; padding: 19px 29px; border: 1px solid var(--black-color-20); border-radius: 4px;  max-width:400px; }
    .xans-member-findpasswdquestion .ec-base-desc .term, .xans-member-findpasswdquestion .ec-base-desc .term { font-size: 16px; font-weight: 400; line-height: 1.5; }
    .xans-member-findpasswdquestion input { width: 100%; border-radius: 4px; }
    @media(max-width: 1024px) {
        .xans-member-findpasswdquestion .ec-base-desc .term, .xans-member-findpasswdquestion .ec-base-desc .term { font-size: 13px; }
    }
</style>
<div class="section titleArea">
    <h2>비밀번호 찾기</h2>
</div>

<div module="member_findPasswdQuestion" class="memberArea">
    <!--@css(/css/module/member/find_passwd_question.css)-->
    <!--
        $nextURL = /member/passwd/find_passwd_method.html
    -->
    <div class="ec-base-box typeMember">
        <fieldset class="content">
            <legend>비밀번호 찾기 2단계 힌트답변 입력</legend>
            <p class="check">{$form.check_method}</p>
            <ul class="ec-base-desc gVer">
                <li>
                	<strong class="term">질문</strong>
                    <div class="desc">{$passwd_question}</div>
                </li>
                <li>
                	<strong class="term"><label for="passwd_answer">답변</label></strong>
                    <div class="desc">{$form.passwd_answer}</div>
                </li>
            </ul>
        </fieldset>
    </div>
    <div class="ec-base-button gBottom">
        <a href="#none" class="btnSubmitFix sizeM gFull" onclick="{$action_func_find_passwd}" role="button">확인</a>
    </div>
</div>
