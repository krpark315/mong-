<!--@layout(/layout/basic/layout.html)-->
<style>
    .ec-base-box.typeThin { border: none; }
    .ec-base-box.typeThin h3.boxTitle { color: var(--black-color); font-size: 20px; font-weight: 600; line-height: 1.5; }
    .xans-member-checkpassword .confirm .info, .xans-member-checkpassword .confirm .password label { color: var(--gray-color); font-size: 16px; font-weight: 400; line-height: 1.5; }
    .xans-member-checkpassword .confirm .password { display: flex; align-items: center;  }
    .xans-member-checkpassword .confirm .password input { width: 100%; height: 48px; }
    .xans-member-checkpassword .confirm .info strong { color: var(--black-color); }
    .xans-member-checkpassword .ec-base-button a { margin: 0 !important; }
    
    @media(max-width: 1024px){
        .ec-base-box.typeThin h3.boxTitle { font-size: 16px; }
        .xans-member-checkpassword .confirm { width: 320px; }
        .xans-member-checkpassword .confirm .info, .xans-member-checkpassword .confirm .password label { font-size: 13px; }

    }
</style>
<div class="path" role="navigation" aria-label="현재 위치">
    <span aria-hidden="true">Current Page</span>
    <ol>
        <li><a href="/">Home</a></li>
        <li title="Current Page" aria-current="page"><strong>내정보 수정</strong></li>
    </ol>
</div>
<div class="titleArea">
    <h2>내정보 수정</h2>
</div>
<div module="member_checkpassword" class="ec-base-box typeThin">
    {$enc_password}
    <!--@css(/css/module/member/checkpassword.css)-->
    <h3 class="boxTitle">비밀번호 확인</h3>
    <div class="confirm">
        <fieldset>
            <legend>비밀번호 확인</legend>
            <p class="info"><strong>{$member_id}</strong> 님의 회원정보를 안전하게 보호하기 위해<br />비밀번호를 한번 더 확인해 주세요.</p>
            <p class="password"><label for="cp_password">비밀번호</label>{$form.cp_password}</p>
            <div class="ec-base-button gColumn">
                <a href="#none" class="btnSubmit sizeM" onclick="{$check_password_action}" role="button">확인</a>
            </div>
        </fieldset>
    </div>
</div>
