<!-- Custom Alert Modal -->
<div id="customAlertModal" hidden>
<div aria-hidden="true" style="position:fixed;top:0;left:0;right:0;bottom:0;z-index:999;background:#000;opacity:0.3;"></div>
<div role="alertdialog" aria-modal="true" aria-labelledby="customAlertTitle" aria-describedby="customAlertDesc" tabindex="-1" style="position:fixed;top:50%;left:50%;z-index:1000;transform:translate(-50%, -50%);width:calc(100vw - 40px);max-width:450px;max-height:calc(100vh - 144px);padding:40px 20px 20px;box-sizing:border-box;background:#FFF;border:1px solid #D4D4D4;box-shadow:0 8px 24px 0 rgba(0, 0, 0, 0.15);">
<div style="display:flex;flex-direction:column;gap:40px;justify-content:center;align-items:center;">
<p id="customAlertTitle" style="font-size:16px;line-height:150%;color:#000;text-align:center;"></p>
<span id="customAlertDesc" class="sr-only" style="position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;">확인 버튼 또는 ESC 키를 눌러 닫을 수 있습니다.</span>
<div style="display:flex;gap:8px;">
<button type="button" data-action="confirm" onclick="CustomModal.closeAlert();" style="min-width:110px;height:48px;padding:0 20px;box-sizing:border-box;border-radius:4px;font-weight:600;font-size:14px;line-height:48px;color:var(--primary-on-text-color, #fff);background-color:var(--primary-color, #000);border:none;cursor:pointer;">확인</button>
</div>
</div>
</div>
</div>
<!-- Custom Confirm Modal -->
<div id="customConfirmModal" hidden>
<div aria-hidden="true" style="position:fixed;top:0;left:0;right:0;bottom:0;z-index:999;background:#000;opacity:0.3;"></div>
<div role="dialog" aria-modal="true" aria-labelledby="customConfirmTitle" aria-describedby="customConfirmDesc" tabindex="-1" style="position:fixed;top:50%;left:50%;z-index:1000;transform:translate(-50%, -50%);width:calc(100vw - 40px);max-width:450px;max-height:calc(100vh - 144px);padding:40px 20px 20px;box-sizing:border-box;background:#FFF;border:1px solid #D4D4D4;box-shadow:0 8px 24px 0 rgba(0, 0, 0, 0.15);">
<div style="display:flex;flex-direction:column;gap:40px;justify-content:center;align-items:center;">
<p id="customConfirmTitle" style="font-size:16px;line-height:150%;color:#000;text-align:center;"></p>
<span id="customConfirmDesc" class="sr-only" style="position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;">확인 또는 취소 버튼을 눌러 선택할 수 있습니다. ESC 키는 취소와 동일합니다.</span>
<div style="display:flex;gap:8px;">
<button type="button" data-action="cancel" onclick="CustomModal.closeConfirm(false);" style="min-width:110px;height:48px;padding:0 20px;box-sizing:border-box;border:1px solid #7D7D7F;border-radius:4px;font-weight:600;font-size:14px;line-height:48px;color:#000;background-color:#fff;cursor:pointer;">취소</button>
<button type="button" data-action="confirm" onclick="CustomModal.closeConfirm(true);" style="min-width:110px;height:48px;padding:0 20px;box-sizing:border-box;border-radius:4px;font-weight:600;font-size:14px;line-height:48px;color:var(--primary-on-text-color, #fff);background-color:var(--primary-color, #000);border:none;cursor:pointer;">확인</button>
</div>
